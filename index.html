<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <!-- tailwind + daisyui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- favicon -->
    <link rel="shortcut icon" href="./images/github-logo.png" type="image/x-icon">
    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- css -->
    <link rel="stylesheet" href="./styles/index.css">

</head>

<body>
    <header class="mb-7">
        <div class="bg-white p-4">
            <h2 class="font-semibold text-2xl"><span><i class="fa-brands fa-github"></i></span> GitHub Issues Tracker
            </h2>
        </div>
    </header>

    <section class=" mb-7">
        <div class="mx-[260px] flex gap-4 bg-white p-4 ">
            <button class="btn btn-outline text-[#64748B]">All</button>
            <button class="btn btn-outline text-[#64748B]">Open</button>
            <button class="btn btn-outline text-[#64748B]">Closed</button>
        </div>
    </section>

    <section class="mx-[260px] bg-white flex justify-between mb-[24px]" >
      <div class=" flex gap-5 p-4">
         <div> <img src="./images/Group 1.png" alt=""></div>
       <div> <h2 class="font-semibold text-2xl">50 Issues</h2>
        <p class="text-[#64748B]">Track and manage your project issues</p></div>
      </div>
      <div class="p-4 font-semibold flex gap-5 ">
        <div class="flex gap-3 items-center">
            <span class="inline-block w-2 h-2 bg-[#00A96E] rounded-full"></span>
            <p>Open</p></div>
        <div class="flex gap-3 items-center">
            <span class=" inline-block w-2 h-2 bg-[#A855F7] rounded-full"></span>
            <p> Closed</p>
        </div>
      </div>
    </section>

    <section>
        <div>
            <div>
                <span><i class="fa-solid fa-spinner"></i></span>
                <h4>High</h4>
            </div>
            <div>
                <h3>Fix navigation menu on mobile devices</h3>
                <p>The navigation menu doesn't collapse properly on mobile devices...</p>
            </div>
        </div>
    </section>

    <script src="./script/index.js"></script>
</body>

</html>
